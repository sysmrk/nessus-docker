version: '3.3'

services:
  nessus:
    restart: always
    build: nessus-scanner
    init: true
    stop_grace_period: 2m
    shm_size: 1g
    ports:
      - 127.0.0.1:9934:8834
    volumes:
      - nessus-data:/opt/nessus/var/nessus
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8834'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 3m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  nessus-data:
