# Nessus Vulnerability Scanner

version: '3.8'

services:
  nessus:
    image: tenable/nessus:10.12.0-ubuntu
    restart: unless-stopped
    init: true
    stop_grace_period: 2m
    shm_size: 1g
    expose:
      - 8834
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8834'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 3m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  nginx:
    build: nginx
    restart: unless-stopped
    depends_on:
      - nessus
    ports:
      - 127.0.0.1:9934:443
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet --no-check-certificate https://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
