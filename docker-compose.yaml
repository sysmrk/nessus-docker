# Nessus Vulnerability Scanner

version: '2.4'

services:
  nessus:
    image: tenable/nessus:10.12.0-ubuntu
    restart: unless-stopped
    init: true
    stop_grace_period: 2m
    shm_size: 1g
    expose:
      - 8834
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8834' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 5m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  nginx:
    build: nginx
    restart: unless-stopped
    depends_on:
      nessus:
        condition: service_healthy
    environment:
      ENABLE_SSL: "false"
      TLS_CERT_CN: localhost
      TLS_CERT_DAYS: 3650
    ports:
      - 127.0.0.1:9934:80
      - 127.0.0.1:9943:443
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/nginx-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
